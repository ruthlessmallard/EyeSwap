name: eyeswap
description: Personal Media & Navigation Controller for Vehicle Use
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  android_intent_plus: ^4.0.3
  share_plus: ^10.0.0
  flutter_blue_plus: ^1.33.7
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.3
  wakelock: ^0.4.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/logo.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#1A1A1A"
  adaptive_icon_foreground: "assets/images/logo.jpg"

flutter:
  uses-material-design: true